{% extends 'base.html' %}

{% block title %}Server Error - HUMISENSE{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center hero-gradient grid-pattern">
    <div class="text-center px-4">
        <div class="text-9xl font-bold text-red-500/20 mb-4">500</div>
        <h1 class="text-4xl md:text-5xl font-bold mb-6">Something Went Wrong</h1>
        <p class="text-xl text-gray-600 dark:text-gray-400 mb-8 max-w-md mx-auto">
            We're experiencing some technical difficulties. Our team has been notified and is working on it.
        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('home') }}" class="btn btn-primary text-lg px-8 py-4">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Try Again
            </a>
            <a href="{{ url_for('contact') }}" class="btn btn-outline text-lg px-8 py-4">
                Contact Support
            </a>
        </div>
    </div>
</section>
{% endblock %}
