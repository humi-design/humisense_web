<!-- Counters Component -->
<section class="py-16 bg-gradient-to-r from-primary-600 to-primary-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
            {% for stat in stats %}
            <div class="text-center">
                <div class="text-4xl md:text-5xl font-bold text-white mb-2">
                    <span class="counter" data-target="{{ stat.value }}">{{ stat.value }}</span>{{ stat.suffix }}
                </div>
                <p class="text-primary-100 text-sm md:text-base">{{ stat.label }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const counters = document.querySelectorAll('.counter');
    
    const observerOptions = {
        threshold: 0.5
    };
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const counter = entry.target;
                const target = parseInt(counter.dataset.target);
                
                // Check if CountUp is available
                if (typeof CountUp !== 'undefined') {
                    const countUp = new CountUp(counter, target, {
                        duration: 2,
                        separator: ',',
                        useEasing: true,
                        useGrouping: true
                    });
                    
                    if (!countUp.error) {
                        countUp.start();
                    } else {
                        counter.textContent = target;
                    }
                } else {
                    // Fallback animation
                    let current = 0;
                    const increment = target / 60;
                    const timer = setInterval(() => {
                        current += increment;
                        if (current >= target) {
                            counter.textContent = target;
                            clearInterval(timer);
                        } else {
                            counter.textContent = Math.floor(current);
                        }
                    }, 1000 / 60);
                }
                
                observer.unobserve(counter);
            }
        });
    }, observerOptions);
    
    counters.forEach(counter => observer.observe(counter));
});
</script>
