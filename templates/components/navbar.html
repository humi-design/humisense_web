<!-- Mobile Menu Overlay -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Mobile Menu Panel -->
<div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-header">
        <a href="{{ url_for('home') }}" class="nav-logo">
            <div class="nav-logo-icon">H</div>
            <span class="nav-logo-text">HUMISENSE</span>
        </a>
        <button class="mobile-menu-close" id="mobileMenuClose" aria-label="Close menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18"/>
                <path d="m6 6 12 12"/>
            </svg>
        </button>
    </div>
    
    <ul class="mobile-nav-links">
        <li><a href="{{ url_for('products') }}" class="mobile-nav-link">Products</a></li>
        <li><a href="{{ url_for('services') }}" class="mobile-nav-link">Services</a></li>
        <li><a href="{{ url_for('research') }}" class="mobile-nav-link">Research</a></li>
        <li><a href="{{ url_for('courses') }}" class="mobile-nav-link">Academy</a></li>
        <li><a href="{{ url_for('about') }}" class="mobile-nav-link">About</a></li>
        <li><a href="{{ url_for('contact') }}" class="mobile-nav-link">Contact</a></li>
    </ul>
    
    <div class="mobile-menu-footer">
        <button class="btn btn-secondary w-full justify-center" id="mobileThemeToggle">
            <svg class="mr-2 sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
            <svg class="mr-2 moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
            Toggle Theme
        </button>
        <a href="{{ url_for('contact') }}" class="btn btn-primary w-full justify-center">
            Get Started
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>
        </a>
    </div>
</div>

<script>
(function() {
    'use strict';
    
    // ============================================
    // Theme Toggle
    // ============================================
    const themeToggle = document.getElementById('themeToggle');
    const mobileThemeToggle = document.getElementById('mobileThemeToggle');
    
    // Check for saved theme preference or default to light
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
    }
    
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.documentElement.classList.add('theme-transitioning');
        setTimeout(() => {
            document.documentElement.classList.remove('theme-transitioning');
        }, 300);
    }
    
    if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
    if (mobileThemeToggle) mobileThemeToggle.addEventListener('click', toggleTheme);
    
    // ============================================
    // Headroom.js - Sticky Navigation
    // ============================================
    const navbar = document.getElementById('navbar');
    if (navbar && typeof Headroom !== 'undefined') {
        const headroom = new Headroom(navbar, {
            offset: 100,
            tolerance: 5,
            classes: {
                initial: 'navbar',
                pinned: 'scrolled',
                unpinned: 'transparent',
                top: 'at-top',
                notTop: 'scrolled'
            }
        });
        headroom.init();
    } else {
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar?.classList.add('scrolled');
                navbar?.classList.remove('transparent');
            } else {
                navbar?.classList.remove('scrolled');
                navbar?.classList.add('transparent');
            }
        });
    }
    
    // ============================================
    // Mobile Menu - Fixed for Touch Devices
    // ============================================
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileMenuClose = document.getElementById('mobileMenuClose');
    const menuOverlay = document.getElementById('menuOverlay');
    
    if (!mobileMenuBtn || !mobileMenu) {
        console.warn('Mobile menu elements not found');
        return;
    }
    
    let isMenuOpen = false;
    
    function openMenu() {
        isMenuOpen = true;
        mobileMenu.classList.add('active');
        if (menuOverlay) menuOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        document.body.classList.add('menu-open');
        
        // Animate hamburger to X
        const lines = mobileMenuBtn.querySelectorAll('.hamburger-line');
        if (lines.length === 3) {
            lines[0].classList.add('hamburger-active-top');
            lines[1].classList.add('hamburger-active-middle');
            lines[2].classList.add('hamburger-active-bottom');
        }
        
        // Focus trap for accessibility
        mobileMenuClose?.focus();
    }
    
    function closeMenu() {
        isMenuOpen = false;
        mobileMenu.classList.remove('active');
        if (menuOverlay) menuOverlay.classList.remove('active');
        document.body.style.overflow = '';
        document.body.classList.remove('menu-open');
        
        // Animate X to hamburger
        const lines = mobileMenuBtn.querySelectorAll('.hamburger-line');
        if (lines.length === 3) {
            lines[0].classList.remove('hamburger-active-top');
            lines[1].classList.remove('hamburger-active-middle');
            lines[2].classList.remove('hamburger-active-bottom');
        }
        
        // Return focus to hamburger button
        mobileMenuBtn.focus();
    }
    
    function toggleMenu() {
        if (isMenuOpen) {
            closeMenu();
        } else {
            openMenu();
        }
    }
    
    // Click events
    mobileMenuBtn.addEventListener('click', toggleMenu);
    
    if (mobileMenuClose) {
        mobileMenuClose.addEventListener('click', closeMenu);
    }
    
    if (menuOverlay) {
        menuOverlay.addEventListener('click', closeMenu);
    }
    
    // Close on link click
    const mobileNavLinks = mobileMenu.querySelectorAll('.mobile-nav-link');
    mobileNavLinks.forEach(link => {
        link.addEventListener('click', closeMenu);
    });
    
    // Touch swipe to close (for iOS/Android)
    let touchStartX = 0;
    let touchEndX = 0;
    
    mobileMenu.addEventListener('touchstart', function(e) {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    
    mobileMenu.addEventListener('touchend', function(e) {
        touchEndX = e.changedTouches[0].screenX;
        // Swipe left to close (more than 50px)
        if (touchStartX - touchEndX > 50 && isMenuOpen) {
            closeMenu();
        }
    }, { passive: true });
    
    // Close on escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && isMenuOpen) {
            closeMenu();
        }
    });
    
    // Prevent scroll on iOS when menu is open
    mobileMenu.addEventListener('touchmove', function(e) {
        if (isMenuOpen) {
            e.preventDefault();
        }
    }, { passive: false });
    
    // Handle resize - close menu if switching to desktop
    window.addEventListener('resize', function() {
        if (window.innerWidth > 1024 && isMenuOpen) {
            closeMenu();
        }
    });
})();
</script>
