<!-- Mobile Menu Overlay -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Mobile Menu Panel -->
<div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-header">
        <a href="{{ url_for('home') }}" class="nav-logo">
            <div class="nav-logo-icon">H</div>
            <span class="nav-logo-text">HUMISENSE</span>
        </a>
        <button class="mobile-menu-close" id="mobileMenuClose" aria-label="Close menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18"/>
                <path d="m6 6 12 12"/>
            </svg>
        </button>
    </div>
    
    <ul class="mobile-nav-links">
        <li><a href="{{ url_for('products') }}">Products</a></li>
        <li><a href="{{ url_for('services') }}">Services</a></li>
        <li><a href="{{ url_for('research') }}">Research</a></li>
        <li><a href="{{ url_for('courses') }}">Academy</a></li>
        <li><a href="{{ url_for('about') }}">About</a></li>
        <li><a href="{{ url_for('contact') }}">Contact</a></li>
    </ul>
    
    <div class="flex flex-col gap-3 mt-auto">
        <button class="btn btn-secondary w-full justify-center" id="mobileThemeToggle">
            <svg class="mr-2 sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
            <svg class="mr-2 moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
            Toggle Theme
        </button>
        <a href="{{ url_for('contact') }}" class="btn btn-primary w-full justify-center">
            Get Started
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </svg>
        </a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // ============================================
    // Theme Toggle
    // ============================================
    const themeToggle = document.getElementById('themeToggle');
    const mobileThemeToggle = document.getElementById('mobileThemeToggle');
    
    // Check for saved theme preference or default to light
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
    }
    
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        
        // Add transition class
        document.documentElement.classList.add('theme-transitioning');
        setTimeout(() => {
            document.documentElement.classList.remove('theme-transitioning');
        }, 300);
    }
    
    themeToggle?.addEventListener('click', toggleTheme);
    mobileThemeToggle?.addEventListener('click', toggleTheme);
    
    // ============================================
    // Headroom.js - Sticky Navigation
    // ============================================
    const navbar = document.getElementById('navbar');
    if (navbar && typeof Headroom !== 'undefined') {
        const headroom = new Headroom(navbar, {
            offset: 100,
            tolerance: 5,
            classes: {
                initial: 'navbar',
                pinned: 'scrolled',
                unpinned: 'transparent',
                top: 'at-top',
                notTop: 'scrolled'
            }
        });
        headroom.init();
    } else {
        // Fallback for scroll handling
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar?.classList.add('scrolled');
                navbar?.classList.remove('transparent');
            } else {
                navbar?.classList.remove('scrolled');
                navbar?.classList.add('transparent');
            }
        });
    }
    
    // ============================================
    // Mobile Menu
    // ============================================
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileMenuClose = document.getElementById('mobileMenuClose');
    const menuOverlay = document.getElementById('menuOverlay');
    
    function openMenu() {
        mobileMenu?.classList.add('active');
        menuOverlay?.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        // Animate hamburger to X
        const lines = mobileMenuBtn?.querySelectorAll('span');
        if (lines) {
            gsap.to(lines[0], { rotation: 45, y: 6, duration: 0.3 });
            gsap.to(lines[1], { opacity: 0, duration: 0.15 });
            gsap.to(lines[2], { rotation: -45, y: -6, duration: 0.3 });
        }
    }
    
    function closeMenu() {
        mobileMenu?.classList.remove('active');
        menuOverlay?.classList.remove('active');
        document.body.style.overflow = '';
        
        // Animate X to hamburger
        const lines = mobileMenuBtn?.querySelectorAll('span');
        if (lines) {
            gsap.to(lines[0], { rotation: 0, y: 0, duration: 0.3 });
            gsap.to(lines[1], { opacity: 1, duration: 0.3 });
            gsap.to(lines[2], { rotation: 0, y: 0, duration: 0.3 });
        }
    }
    
    mobileMenuBtn?.addEventListener('click', () => {
        if (mobileMenu?.classList.contains('active')) {
            closeMenu();
        } else {
            openMenu();
        }
    });
    
    mobileMenuClose?.addEventListener('click', closeMenu);
    menuOverlay?.addEventListener('click', closeMenu);
    
    // Close on link click
    mobileMenu?.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', closeMenu);
    });
});
</script>
