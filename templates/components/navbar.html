<!-- Mobile Drawer Overlay -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- Mobile Drawer Menu -->
<div class="mobile-drawer" id="mobileDrawer">
    <div class="drawer-header">
        <a href="{{ url_for('home') }}" class="nav-logo" onclick="closeDrawer()">
            <div class="nav-logo-icon">H</div>

            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            </svg>
        </button>
    </div>
    
    <div class="drawer-content">
        <ul class="drawer-nav">
            <li><a href="{{ url_for('products') }}" class="drawer-link" onclick="closeDrawer()">Products</a></li>
            <li><a href="{{ url_for('services') }}" class="drawer-link" onclick="closeDrawer()">Services</a></li>
            <li><a href="{{ url_for('research') }}" class="drawer-link" onclick="closeDrawer()">Research</a></li>
            <li><a href="{{ url_for('courses') }}" class="drawer-link" onclick="closeDrawer()">Academy</a></li>
            <li><a href="{{ url_for('about') }}" class="drawer-link" onclick="closeDrawer()">About</a></li>
            <li><a href="{{ url_for('contact') }}" class="drawer-link" onclick="closeDrawer()">Contact</a></li>
        </ul>
        
        <div class="drawer-footer">
            <button class="btn btn-secondary w-full" id="drawerThemeToggle">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
                </svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                </svg>
                Toggle Theme
            </button>
            <a href="{{ url_for('contact') }}" class="btn btn-primary w-full" onclick="closeDrawer()">
                Get Started
            </a>
        </div>
    </div>
</div>

<script>
// Theme - Default to LIGHT
(function() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
    }
    
    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    
    document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
    document.getElementById('drawerThemeToggle')?.addEventListener('click', toggleTheme);
})();

// Mobile Drawer
(function() {
    const mobileToggle = document.getElementById('mobileToggle');
    const mobileDrawer = document.getElementById('mobileDrawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const drawerClose = document.getElementById('drawerClose');
    
    function openDrawer() {
        mobileDrawer.classList.add('open');
        drawerOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        mobileToggle.classList.add('is-active');
        drawerClose.focus();
    }
    
    function closeDrawer() {
        mobileDrawer.classList.remove('open');
        drawerOverlay.classList.remove('active');
        document.body.style.overflow = '';
        mobileToggle.classList.remove('is-active');
        mobileToggle.focus();
    }
    
    // Toggle drawer
    mobileToggle?.addEventListener('click', function(e) {
        e.preventDefault();
        if (mobileDrawer.classList.contains('open')) {
            closeDrawer();
        } else {
            openDrawer();
        }
    });
    
    // Close on overlay click
    drawerOverlay?.addEventListener('click', closeDrawer);
    
    // Close on X button
    drawerClose?.addEventListener('click', closeDrawer);
    
    // Close on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && mobileDrawer.classList.contains('open')) {
            closeDrawer();
        }
    });
    
    // Close on link click
    mobileDrawer?.querySelectorAll('.drawer-link, .drawer-footer a').forEach(function(link) {
        link.addEventListener('click', closeDrawer);
    });
    
    // Swipe to close
    let startX = 0;
    mobileDrawer?.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    }, { passive: true });
    
    mobileDrawer?.addEventListener('touchend', function(e) {
        const diffX = startX - e.changedTouches[0].clientX;
        if (diffX > 80) closeDrawer();
    }, { passive: true });
})();
</script>
