<!-- Mobile Menu Overlay -->
<div class="menu-overlay fixed inset-0 bg-black/80 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition-opacity duration-300"></div>

<!-- Mobile Menu -->
<div id="mobile-menu" class="mobile-menu fixed top-0 right-0 w-full max-w-md h-full bg-[#0a0f1c] z-50 transform translate-x-full transition-transform duration-300">
    <div class="p-8 h-full flex flex-col">
        <div class="flex items-center justify-between mb-12">
            <span class="text-2xl font-bold gradient-text">HUMISENSE</span>
            <button id="mobile-menu-close" class="p-2 rounded-lg hover:bg-white/10 transition-colors">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        
        <ul class="space-y-6 flex-1">
            <li><a href="{{ url_for('products') }}" class="text-2xl font-semibold hover:text-primary-400 transition-colors block py-2">Products</a></li>
            <li><a href="{{ url_for('services') }}" class="text-2xl font-semibold hover:text-primary-400 transition-colors block py-2">Services</a></li>
            <li><a href="{{ url_for('research') }}" class="text-2xl font-semibold hover:text-primary-400 transition-colors block py-2">Research</a></li>
            <li><a href="{{ url_for('courses') }}" class="text-2xl font-semibold hover:text-primary-400 transition-colors block py-2">Education</a></li>
            <li><a href="{{ url_for('about') }}" class="text-2xl font-semibold hover:text-primary-400 transition-colors block py-2">About</a></li>
            <li><a href="{{ url_for('contact') }}" class="text-2xl font-semibold hover:text-primary-400 transition-colors block py-2">Contact</a></li>
        </ul>
        
        <div class="pt-8 border-t border-white/10">
            <a href="{{ url_for('contact') }}" class="btn btn-primary w-full justify-center text-lg py-4 btn-glow btn-ripple">
                Get Started
                <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
            </a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileMenuClose = document.getElementById('mobile-menu-close');
    const menuOverlay = document.querySelector('.menu-overlay');
    const body = document.body;

    function openMenu() {
        mobileMenu.classList.add('active');
        menuOverlay.classList.remove('opacity-0', 'pointer-events-none');
        menuOverlay.classList.add('opacity-100');
        mobileMenu.style.transform = 'translateX(0)';
        body.style.overflow = 'hidden';
        
        // Animate hamburger to X
        const lines = mobileMenuBtn.querySelectorAll('span');
        gsap.to(lines[0], { rotation: 45, y: 6, duration: 0.3 });
        gsap.to(lines[1], { opacity: 0, duration: 0.15 });
        gsap.to(lines[2], { rotation: -45, y: -6, duration: 0.3 });
    }

    function closeMenu() {
        mobileMenu.classList.remove('active');
        menuOverlay.classList.add('opacity-0', 'pointer-events-none');
        menuOverlay.classList.remove('opacity-100');
        mobileMenu.style.transform = 'translateX(100%)';
        body.style.overflow = '';
        
        // Animate X to hamburger
        const lines = mobileMenuBtn.querySelectorAll('span');
        gsap.to(lines[0], { rotation: 0, y: 0, duration: 0.3 });
        gsap.to(lines[1], { opacity: 1, duration: 0.3 });
        gsap.to(lines[2], { rotation: 0, y: 0, duration: 0.3 });
    }

    if (mobileMenuBtn && mobileMenu && mobileMenuClose) {
        mobileMenuBtn.addEventListener('click', () => {
            if (mobileMenu.classList.contains('active')) {
                closeMenu();
            } else {
                openMenu();
            }
        });
        
        mobileMenuClose.addEventListener('click', closeMenu);
        menuOverlay?.addEventListener('click', closeMenu);
        
        // Close on link click
        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', closeMenu);
        });
    }
});
</script>
